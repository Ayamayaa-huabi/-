name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller only
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # 添加当前目录到 PYTHONPATH，让 PyInstaller 能找到仓库中的库
          $env:PYTHONPATH = "."
          pyinstaller --onefile --add-data "src;src" --paths . main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-exe
          path: dist/main.exe
