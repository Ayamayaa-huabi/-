name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install qfluentwidgets PySide6 opencv-python pillow numpy shapely onnxruntime psutil pyclipper pygame rapidfuzz rapidocr_onnxruntime pywin32 pyyaml
      - name: Unzip source
        run: |
          powershell Expand-Archive -Path *.zip -DestinationPath .
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --add-data "src;src" main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-exe
          path: dist/main.exe
